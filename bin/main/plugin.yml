name: HereShoppy
version: 1.2.3
main: com.hereshoppy.hereshoppy.HereShoppyPlugin
api-version: '1.21'
description: A comprehensive economy, shop progression, and item generation plugin.
commands:
  hereshoppy:
    description: Main command for HereShoppy
    usage: /hereshoppy <shop|info|reload>
    aliases: [hs]
  shop:
    description: Open the HereShoppy shop directly
    usage: /shop
permissions:
  hereshoppy.use:
    description: Allows use of HereShoppy commands
    default: true
  hereshoppy.admin:
    description: Allows administrative HereShoppy commands
    default: op
